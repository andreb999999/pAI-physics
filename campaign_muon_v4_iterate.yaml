# =============================================================================
# Muon v4 Iterate Campaign — H1/H2/H3 Revision
# =============================================================================
# Revision cycle: takes prior paper (v3) + collaborator feedback and produces
# a revised paper with the H1->H2->H3 storyline restored.
#
# Initialize:
#   python scripts/campaign_heartbeat.py --campaign campaign_muon_v4_iterate.yaml --init
# Run heartbeat:
#   python scripts/campaign_heartbeat.py --campaign campaign_muon_v4_iterate.yaml

name: "Muon v4 Iterate — H1/H2/H3 Revision"
workspace_root: "results/muon_v4_iterate"
budget_usd: 3000.0

heartbeat_interval_minutes: 15
max_idle_ticks: 8
max_campaign_hours: 48
counsel_model_timeout_seconds: 3600

# Dynamic planning disabled — iterate mode handles its own staging internally.
planning:
  enabled: false

stages:
  - id: iterate_v4
    task_file: automation_tasks/muon_v4_iterate_task.txt
    args:
      - "--iterate"
      - "/orcd/scratch/orcd/012/mabdel03/AI_Researcher/muon_v3_iterate"
      - "--iterate-start-stage"
      - "literature_review_agent"
      - "--enable-math-agents"
      - "--no-counsel"
      - "--enforce-paper-artifacts"
      - "--enforce-editorial-artifacts"
      - "--require-pdf"
      - "--min-review-score"
      - "8"
    depends_on: []
    context_from: []
    success_artifacts:
      required:
        - "paper_workspace/paper_contract.json"
        - "paper_workspace/abstract.tex"
        - "paper_workspace/introduction.tex"
        - "paper_workspace/methods.tex"
        - "paper_workspace/results.tex"
        - "paper_workspace/discussion.tex"
        - "paper_workspace/conclusion.tex"
        - "paper_workspace/final_paper.tex"
        - "paper_workspace/final_paper.pdf"
        - "paper_workspace/copyedit_report.tex"
        - "paper_workspace/copyedit_report.pdf"
        - "paper_workspace/review_verdict.json"
        - "paper_workspace/persona_verdicts.json"
      optional:
        - "paper_workspace/review_report.tex"
        - "paper_workspace/review_report.pdf"
        - "paper_workspace/revision_log.md"
    artifact_validators:
      paper_workspace/paper_contract.json:
        must_contain:
          - "Muon"
          - "H1"
          - "H2"
          - "H3"
      paper_workspace/final_paper.tex:
        must_contain:
          - "Muon"
          - "H1"
          - "H2"
          - "H3"
          - "ATSR"
          - "B_crit"
        must_not_contain:
          - "Research Paper Title"
          - "Author Names"
          - "TODO"
          - "\\cite{?}"
          - "??"
      paper_workspace/final_paper.pdf:
        min_size_bytes: 20000
      paper_workspace/review_verdict.json:
        json_required_keys:
          - "overall_score"
          - "hard_blockers"
          - "must_fix_actions"
        json_min_numeric:
          overall_score: 8
        json_max_list_length:
          hard_blockers: 0

# --- Autonomous Repair ---
repair:
  enabled: true
  max_attempts: 2
  launcher: local
  model: claude-opus-4-6
  effort: max
  budget_usd: 25.0
  timeout_seconds: 600
  allowed_actions:
    - edit_code
    - fix_config
    - generate_missing_artifacts
    - install_dependencies
  two_phase: true
  plan_model: claude-opus-4-6
  min_review_score: 7

# --- Notifications ---
notification:
  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
  on_stage_complete: true
  on_failure: true
  on_heartbeat: false
