# =============================================================================
# PoggioAI/MSc Quickstart Campaign Example
# =============================================================================
# A minimal campaign that demonstrates the multi-stage pipeline.
# Uses the included task.txt and runs with safe defaults.
#
# Usage:
#   python scripts/campaign_heartbeat.py --campaign examples/quickstart/campaign.yaml --init
#   python scripts/campaign_cli.py --campaign examples/quickstart/campaign.yaml launch discovery_plan
#   python scripts/campaign_heartbeat.py --campaign examples/quickstart/campaign.yaml

name: "Quickstart — Batch Norm Spectral Regularization"
workspace_root: "results/quickstart_campaign"

heartbeat_interval_minutes: 15
max_idle_ticks: 6
max_campaign_hours: 24
counsel_model_timeout_seconds: 1800

# --- Dynamic Planning ---
planning:
  enabled: true
  base_task_file: examples/quickstart/task.txt
  max_stages: 4
  max_parallel: 1
  human_review: false                   # auto-approve for demo purposes
  planning_budget_usd: 3.0
  planning_timeout_seconds: 300

stages: []

# --- Repair ---
repair:
  enabled: true
  max_attempts: 1
  launcher: local
  claude_binary: auto
  model: claude-sonnet-4-6
  effort: max
  budget_usd: 5.0
  timeout_seconds: 300
  allowed_actions:
    - edit_code
    - fix_config
    - generate_missing_artifacts
  two_phase: true
  plan_model: claude-sonnet-4-6
  min_review_score: 7

# --- Notifications (optional — set tokens in .env) ---
notification:
  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
  on_stage_complete: true
  on_failure: true
  on_heartbeat: false
