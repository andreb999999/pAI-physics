# LLM Configuration File
# This file controls which language models are used by different components

main_agents:
  # Model for all main agents (Manager, Ideation, Experimentation, Writeup)
  model: claude-sonnet-4-5

  # GPT-5 specific settings
  reasoning_effort: high
  verbosity: medium

run_experiment_tool:
  # Models for RunExperimentTool (AI-Scientist-v2 subprocess)
  code_model: claude-sonnet-4-5
  feedback_model: claude-sonnet-4-5
  vlm_model: claude-sonnet-4-5
  report_model: claude-sonnet-4-5
  # GPT-5 specific settings
  reasoning_effort: high  # minimal, low, medium, high

# HARD COST CAP (requires pricing to be filled in)
# If usd_limit is set, the system will stop once the running total reaches the limit.
# IMPORTANT: You must provide accurate per-model prices to enforce the cap.
budget:
  usd_limit: 150
  hard_stop: true
  fail_closed: true
  pricing:
    gpt-5.2:
      input_per_1k: 0.00175
      output_per_1k: 0.01400
    claude-sonnet-4-5:
      input_per_1k: 0.00300
      output_per_1k: 0.01500
