version: "3.9"

services:
  consortium:
    build:
      context: .
      target: full
    image: consortium:latest
    env_file:
      - .env
    volumes:
      # Persist results and logs outside the container
      - ./results:/app/results
      - ./logs:/app/logs
      # Mount config so you can edit it without rebuilding
      - ./.llm_config.yaml:/app/.llm_config.yaml:ro
    # Override command as needed:
    #   docker compose run consortium --task "Your research task" --no-counsel
    command: ["--help"]

  # Minimal image: no web crawl, no Playwright — for quick/cheap runs
  consortium-minimal:
    build:
      context: .
      target: minimal
    image: consortium:minimal
    env_file:
      - .env
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
      - ./.llm_config.yaml:/app/.llm_config.yaml:ro
    command: ["--help"]
