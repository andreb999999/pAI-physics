# =============================================================================
# HPC / SLURM Cluster Configuration for Consortium
# =============================================================================
# This file ships with defaults for the MIT Engaging cluster. If you are
# deploying on a different SLURM cluster, customize the following fields:
#
#   cluster.conda_init_script  — path to your conda conda.sh init script
#   cluster.conda_env_prefix   — path to your conda environment
#   cluster.modules.*          — module names available on your cluster
#   orchestrator.partition     — CPU partition for the orchestrator job
#   experiment_gpu.partition   — GPU partition for experiment jobs
#   paths.repo_root            — path to this repository on your cluster
#   paths.slurm_output_dir    — where to write SLURM logs
#
# All fields support env-var expansion: ${VAR:-default}
# Set env vars (CONDA_INIT_SCRIPT, CONDA_ENV_PREFIX, REPO_ROOT, etc.)
# or edit the values below directly.
#
# Referenced by SLURM scripts, bootstrap, and the SLURM experiment runner.

cluster:
  name: engaging

  # ---------------------------------------------------------------------------
  # Conda environment
  # ---------------------------------------------------------------------------
  conda_init_script: ${CONDA_INIT_SCRIPT:-}   # e.g. /path/to/miniforge3/etc/profile.d/conda.sh
  conda_env_prefix: ${CONDA_ENV_PREFIX:-}     # e.g. /path/to/conda_envs/consortium

  # ---------------------------------------------------------------------------
  # Modules to load
  # ---------------------------------------------------------------------------
  modules:
    conda: miniforge/25.11.0-0
    cuda: cuda/12.4.0
    cudnn: cudnn/9.8.0.87-cuda12

  # ---------------------------------------------------------------------------
  # Orchestrator (Tier 1) — CPU partition for the LLM API orchestrator
  # The orchestrator is CPU-only; it makes outbound HTTPS calls to LLM APIs.
  # ---------------------------------------------------------------------------
  orchestrator:
    partition: pi_tpoggio           # 7-day wall-time, dedicated node
    time: "7-00:00:00"
    cpus: 4
    mem: "32G"

  # ---------------------------------------------------------------------------
  # Experiment GPU jobs (Tier 2) — submitted by the orchestrator via sbatch
  # ---------------------------------------------------------------------------
  # Default: pi_tpoggio — A100x8, 7-day limit, dedicated node
  experiment_gpu:
    partition: pi_tpoggio
    time: "7-00:00:00"
    cpus: 8
    mem: "64G"
    gres: "gpu:a100:1"

  # Fallback partitions (shorter queues, broader availability)
  experiment_gpu_shared:
    partition: mit_normal_gpu
    time: "06:00:00"
    cpus: 8
    mem: "64G"
    gres: "gpu:1"

  experiment_gpu_long:
    partition: mit_preemptable
    time: "2-00:00:00"
    cpus: 8
    mem: "64G"
    gres: "gpu:1"

  # ---------------------------------------------------------------------------
  # Repair agent — Claude Code on Engaging compute nodes
  # Repair jobs use the orchestrator partition (CPU-only, outbound HTTPS)
  # ---------------------------------------------------------------------------
  repair:
    partition: pi_tpoggio             # 7-day wall-time for long repair agents
    time: "01:00:00"
    cpus: 2
    mem: "8G"
    claude_binary: auto               # auto-detect from ~/.cursor-server/

  # ---------------------------------------------------------------------------
  # Paths
  # ---------------------------------------------------------------------------
  repo_root: ${REPO_ROOT:-}                   # e.g. /path/to/OpenPI
  scratch_root: ${SCRATCH_ROOT:-}             # e.g. /path/to/scratch
  slurm_output_dir: ${SLURM_OUTPUT_DIR:-}     # e.g. /path/to/OpenPI/slurm_outputs
