# =============================================================================
# Muon v5 Iterate Campaign — NeurIPS Review Revision
# =============================================================================
# Curated iterate seed built from the completed v4 final paper plus structured
# external NeurIPS review feedback.

name: "Muon v5 Iterate — NeurIPS Review Revision"
workspace_root: "results/muon_v5_iterate"
budget_usd: 4000.0

heartbeat_interval_minutes: 15
max_idle_ticks: 8
max_campaign_hours: 72
counsel_model_timeout_seconds: 3600

planning:
  enabled: false

stages:
  - id: iterate_v5
    task_file: automation_tasks/muon_v5_iterate_task.txt
    args:
      - "--iterate"
      - "/orcd/scratch/orcd/012/mabdel03/AI_Researcher/muon_v5_iterate_seed"
      - "--iterate-start-stage"
      - "literature_review_agent"
      - "--enable-math-agents"
      - "--no-counsel"
      - "--enforce-paper-artifacts"
      - "--enforce-editorial-artifacts"
      - "--require-pdf"
      - "--min-review-score"
      - "8"
      - "--max-rebuttal-iterations"
      - "4"
    depends_on: []
    context_from: []
    success_artifacts:
      required:
        - "paper_workspace/paper_contract.json"
        - "paper_workspace/abstract.tex"
        - "paper_workspace/introduction.tex"
        - "paper_workspace/methods.tex"
        - "paper_workspace/results.tex"
        - "paper_workspace/discussion.tex"
        - "paper_workspace/conclusion.tex"
        - "paper_workspace/final_paper.tex"
        - "paper_workspace/final_paper.pdf"
        - "paper_workspace/copyedit_report.tex"
        - "paper_workspace/copyedit_report.pdf"
        - "paper_workspace/review_verdict.json"
        - "paper_workspace/persona_verdicts.json"
        - "paper_workspace/revision_plan.md"
        - "paper_workspace/revision_changelog.md"
        - "paper_workspace/literature_review.tex"
      optional:
        - "paper_workspace/review_report.tex"
        - "paper_workspace/review_report.pdf"
        - "paper_workspace/review_response_matrix.md"
        - "paper_workspace/revision_log.md"
    artifact_validators:
      paper_workspace/paper_contract.json:
        must_contain:
          - "H1"
          - "H2"
          - "H3"
      paper_workspace/final_paper.tex:
        must_contain:
          - "A6a"
          - "weight decay"
          - "hypothesis"
        must_not_contain:
          - "The Implicit Bias of the Muon Optimizer: Spectral Flattening, Concurrent Acquisition, and Batch Scaling"
          - "These results explain why Muon benefits language models"
          - "Research Paper Title"
          - "Author Names"
          - "TODO"
          - "\\cite{?}"
          - "??"
      paper_workspace/final_paper.pdf:
        min_size_bytes: 20000
      paper_workspace/revision_changelog.md:
        must_contain:
          - "## A6a / shared-frame weakness"
          - "## Title overclaim / regression regularizer gap"
          - "## Block-to-language-model bridge"
          - "## Weight decay tension"
          - "## B_crit momentum / anisotropy caveat"
          - "## Concurrent-work positioning"
          - "## Transformer-scale evidence gap"
      paper_workspace/review_verdict.json:
        json_required_keys:
          - "overall_score"
          - "hard_blockers"
          - "must_fix_actions"
        json_min_numeric:
          overall_score: 8
        json_max_list_length:
          hard_blockers: 0

repair:
  enabled: true
  max_attempts: 2
  launcher: local
  model: claude-opus-4-6
  effort: max
  budget_usd: 25.0
  timeout_seconds: 600
  allowed_actions:
    - edit_code
    - fix_config
    - generate_missing_artifacts
    - install_dependencies
  two_phase: true
  plan_model: claude-opus-4-6
  min_review_score: 7

notification:
  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
  on_stage_complete: true
  on_failure: true
  on_heartbeat: false
