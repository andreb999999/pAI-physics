# consortium Campaign Definition
# Run: python scripts/campaign_heartbeat.py --campaign campaign.yaml --init
# Then have OpenClaw (or a cron job) call:
#        python scripts/campaign_heartbeat.py --campaign campaign.yaml
# every heartbeat_interval_minutes.

name: "Muon Implicit Regularization"

# All stage workspaces live under this directory.
# Stage 2+ will --resume the workspace of their upstream dependency
# so they can see its artifacts directly.
workspace_root: "results/muon_campaign"

# How often (minutes) to tick the heartbeat.
heartbeat_interval_minutes: 30

# --- Notifications (all optional) ---
notification:
  # ntfy.sh push notifications — install the ntfy app and subscribe to your topic.
  ntfy_topic: "OpenClaw-Engaging"
  # ntfy_server: "https://ntfy.sh"  # default; uncomment to use a self-hosted server
  on_stage_complete: true
  on_failure: true
  on_heartbeat: false   # set true for verbose progress pings

# --- Stages ---
stages:

  - id: theory1
    task_file: automation_tasks/run1_theory_task_stable.txt
    args:
      - "--pipeline-mode"
      - "full_research"
      - "--enable-math-agents"
    success_artifacts:
      required:
        - math_workspace/claim_graph.json
      optional:
        - math_workspace/proofs/
        - math_workspace/checks/
    # Directories to include in cross-run memory distillation
    memory_dirs:
      - math_workspace/

  - id: experiments
    task_file: automation_tasks/run2_experiment_task_stable.txt
    depends_on: theory1
    # context_from tells runner.py to resume the theory1 workspace so
    # experiment agents can see math_workspace/ artifacts directly,
    # and to prepend the theory1 memory summary to the task prompt.
    context_from: theory1
    args:
      - "--pipeline-mode"
      - "full_research"
    success_artifacts:
      required:
        - experiment_results.json
        - experiment_analysis.md
      optional:
        - fairness_protocol.json
        - experiment_plan.md

  - id: theory2
    task_file: automation_tasks/run2b_scaling_theory_task.txt
    depends_on: experiments
    context_from:
      - experiments
      - theory1
    args:
      - "--pipeline-mode"
      - "full_research"
      - "--enable-math-agents"
    success_artifacts:
      required:
        - math_workspace/scaling_claims.json
      optional:
        - math_workspace/scaling_proofs/
        - math_workspace/scaling_checks/
    memory_dirs:
      - math_workspace/

  - id: paper
    task_file: automation_tasks/run3_paper_task_stable.txt
    depends_on:
      - theory1
      - experiments
      - theory2
    # Resume the theory2 workspace (which was resumed from experiments,
    # which was resumed from theory1 — so it has all artifacts).
    context_from:
      - theory2
      - experiments
      - theory1
    args:
      - "--pipeline-mode"
      - "full_research"
      - "--require-pdf"
    success_artifacts:
      required:
        - final_paper.tex
        - final_paper.pdf
      optional:
        - analysis_connection.md
        - artifacts_index.md
